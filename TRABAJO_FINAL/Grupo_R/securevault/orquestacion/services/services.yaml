# ─────────────────────────────────────────────────────────
# PostgreSQL — ClusterIP (solo accesible desde dentro del cluster)
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: securevault
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
---
# ─────────────────────────────────────────────────────────
# RabbitMQ — ClusterIP para AMQP interno + NodePort opcional
# para acceder al Management UI durante desarrollo
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: securevault
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
      protocol: TCP
      name: amqp
    - port: 15672
      targetPort: 15672
      protocol: TCP
      name: management
---
# ─────────────────────────────────────────────────────────
# API Gateway — ClusterIP (expuesto al exterior vía Ingress)
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: securevault
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
# ─────────────────────────────────────────────────────────
# Frontend — ClusterIP (expuesto al exterior vía Ingress)
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: securevault
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http

