apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: securevault-ingress
  namespace: securevault
  annotations:
    # Compatible con nginx-ingress-controller y K3s Traefik
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Redirigir HTTP → HTTPS en producción
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting para proteger el endpoint de login
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    # Cabeceras de seguridad
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
spec:
  ingressClassName: nginx      # Cambiar a "traefik" si se usa K3s con Traefik
  rules:
    # ── Frontend (SPA) ──────────────────────────────────
    - host: securevault.local  # Reemplazar con tu dominio real en producción
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          # ── API Gateway — rutas /api y /docs ──────────
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
  # TLS — descomentar y ajustar cuando tengas cert-manager o un certificado real
  # tls:
  #   - hosts:
  #       - securevault.local
  #     secretName: securevault-tls

