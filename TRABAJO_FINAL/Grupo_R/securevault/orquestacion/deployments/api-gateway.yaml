apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: securevault
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api-gateway
          image: CHANGE_ME_REGISTRY/securevault-api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: securevault-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: securevault-secrets
                  key: secret-key
            - name: FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: securevault-secrets
                  key: fernet-key
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: securevault-secrets
                  key: rabbitmq-url
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
