apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-audit
  namespace: securevault
  labels:
    app: worker-audit
    tier: worker
spec:
  replicas: 1              # proceso stateful — una sola réplica evita race conditions en DB
  selector:
    matchLabels:
      app: worker-audit
  template:
    metadata:
      labels:
        app: worker-audit
        tier: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      # Esperar a que postgres y rabbitmq estén listos antes de iniciar
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."; sleep 3;
              done
              echo "Postgres ready."
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z rabbitmq 5672; do
                echo "Waiting for rabbitmq..."; sleep 3;
              done
              echo "RabbitMQ ready."
      containers:
        - name: worker-audit
          image: CHANGE_ME_REGISTRY/securevault-worker-audit:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: securevault-secrets
                  key: database-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: securevault-secrets
                  key: rabbitmq-url
            - name: SECRET_ROTATION_DAYS
              value: "90"
            - name: CHECK_INTERVAL_SECONDS
              value: "30"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          # El worker no expone HTTP; se monitorea con liveness basado en proceso
          livenessProbe:
            exec:
              command: ["python", "-c", "import pika, os; pika.BlockingConnection(pika.URLParameters(os.getenv('RABBITMQ_URL'))).close()"]
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
