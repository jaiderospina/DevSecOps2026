# =============================================================
# Inventario de producción — SecureVault
# =============================================================
# Uso:
#   ansible-playbook site.yml \
#     -i inventories/production.ini \
#     --private-key ~/.ssh/id_ed25519 \
#     -e "target_hosts=securevault_servers" \
#     -e "secret_key=$(openssl rand -hex 32)" \
#     -e "fernet_key=TU_FERNET_KEY" \
#     -e "db_password=TU_DB_PASS" \
#     -e "rmq_password=TU_RMQ_PASS" \
#     -e "docker_registry=tuusuario" \
#     -e "image_tag=v1.0.0-abc12345"
# =============================================================

[securevault_servers]
# Reemplaza con la IP real o hostname de tu servidor
# sv-prod ansible_host=203.0.113.10 ansible_user=ubuntu ansible_port=22
sv-prod ansible_host=CHANGE_ME_SERVER_IP ansible_user=ubuntu ansible_port=22

[securevault_servers:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
# Deshabilitar verificación de host solo en primeros despliegues
# ansible_ssh_common_args='-o StrictHostKeyChecking=no'

