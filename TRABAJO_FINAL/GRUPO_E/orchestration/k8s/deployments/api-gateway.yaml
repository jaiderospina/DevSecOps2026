apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: vulncentral
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: vulncentral/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: POSTGRES_DB
            - name: CORS_ORIGINS
              value: http://frontend,http://localhost:8080
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: JWT_SECRET
            - name: JWT_ALGORITHM
              value: HS256
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: CELERY_RESULT_BACKEND
          volumeMounts:
            - name: reports
              mountPath: /app/data/reports
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 512Mi
      volumes:
        - name: reports
          emptyDir: {}
