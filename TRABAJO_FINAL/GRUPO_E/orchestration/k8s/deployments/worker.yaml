apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: vulncentral
  labels:
    app.kubernetes.io/name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
    spec:
      containers:
        - name: worker
          image: vulncentral/worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: POSTGRES_DB
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: vulncentral-credentials
                  key: CELERY_RESULT_BACKEND
          volumeMounts:
            - name: reports
              mountPath: /app/data/reports
          resources:
            limits:
              memory: 512Mi
      volumes:
        - name: reports
          emptyDir: {}
