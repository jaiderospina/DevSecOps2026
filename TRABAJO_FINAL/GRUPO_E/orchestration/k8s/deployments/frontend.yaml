apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vulncentral
  labels:
    app.kubernetes.io/name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: vulncentral/frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            # URL del API tal como la ve el navegador (no usar solo DNS interno del clúster).
            - name: VC_API_BASE_URL
              value: "http://localhost:8000"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 15
          resources:
            limits:
              memory: 128Mi
