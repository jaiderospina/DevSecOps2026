# Valores de ejemplo — sustituir antes de producción (kubectl apply -f).
apiVersion: v1
kind: Secret
metadata:
  name: vulncentral-credentials
  namespace: vulncentral
type: Opaque
stringData:
  POSTGRES_USER: vulncentral
  POSTGRES_PASSWORD: change_me
  POSTGRES_DB: vulncentral
  RABBITMQ_DEFAULT_USER: vulncentral
  RABBITMQ_DEFAULT_PASS: change_me
  RABBITMQ_DEFAULT_VHOST: vulncentral
  JWT_SECRET: change_me_use_long_random_string
  CELERY_BROKER_URL: amqp://vulncentral:change_me@rabbitmq:5672/vulncentral
  CELERY_RESULT_BACKEND: rpc://
