# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  # No arrancar pgAdmin en producción salvo que se pase explícitamente --profile dev-tools
  pgadmin:
    profiles:
      - dev-tools

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    # En producción exponer PostgreSQL solo tras VPN o red interna; aquí sin mapeo de puerto al host.
    ports: []

  rabbitmq:
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    ports: []

  api-gateway:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    # Publicar el front en 8080 para no requerir privilegios de puerto 80 en el host.
    ports:
      - "8080:8080"
