# Docker Swarm — Secure Workspace
# Uso:
#   docker swarm init
#   docker stack deploy -c orquestacion/docker-swarm.yml sw

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: securews
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: securews
    volumes:
      - postgres_swarm_data:/var/lib/postgresql/data
    networks:
      - sw-overlay
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 3
    secrets:
      - db_password

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - sw-overlay
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure

  api-gateway:
    image: robert0024/sevwork:api-latest
    environment:
      DATABASE_URL: postgresql://securews:securews@postgres:5432/securews
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret
      REDIS_URL: redis://redis:6379/0
    networks:
      - sw-overlay
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
    secrets:
      - jwt_secret

  worker:
    image: robert0024/sevwork:worker-latest
    environment:
      DATABASE_URL: postgresql://securews:securews@postgres:5432/securews
      REDIS_URL: redis://redis:6379/0
    networks:
      - sw-overlay
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure

  frontend:
    image: robert0024/sevwork:frontend-latest
    ports:
      - "80:80"
    networks:
      - sw-overlay
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: on-failure

secrets:
  db_password:
    external: true
  jwt_secret:
    external: true

volumes:
  postgres_swarm_data:

networks:
  sw-overlay:
    driver: overlay
    attachable: true
