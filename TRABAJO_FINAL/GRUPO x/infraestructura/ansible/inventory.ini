# Inventario de Ansible — Secure Workspace
# Define los servidores donde se desplegará la aplicación
#
# Para usar este inventario:
#   ansible-playbook -i inventory.ini site.yml
#
# Reemplazar las IPs y usuarios con los valores reales del entorno

[servidores_app]
# Servidor de producción (simulado)
# Formato: IP ansible_user=usuario ansible_ssh_private_key_file=ruta_clave
servidor-produccion ansible_host=192.168.1.100 ansible_user=deploy

[servidores_app:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_connection=ssh
