# Docker Compose — Secure Workspace
# Orquestación de todos los servicios para desarrollo local

services:
  # ──── Base de Datos ────
  postgres:
    image: postgres:15-alpine
    container_name: sw-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──── Broker de Mensajes ────
  redis:
    image: redis:7-alpine
    container_name: sw-redis
    ports:
      - "6379:6379"
    networks:
      - sw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──── API Gateway (Backend) ────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: sw-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sw-network
    restart: unless-stopped

  # ──── Worker Celery ────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: sw-worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sw-network
    restart: unless-stopped

  # ──── Frontend ────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sw-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - sw-network
    restart: unless-stopped

# ──── Volúmenes persistentes ────
volumes:
  postgres_data:

# ──── Red interna aislada ────
networks:
  sw-network:
    driver: bridge
